<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Szelektív Kuka Játék</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>♻ Szelektív Hulladékgyűjtő Játék</h1>

<div id="gameArea">

    <div id="trash" draggable="true"></div>

    <div class="bins">
        <div class="bin" data-type="paper" style="border-top-color: blue;">
            Papír
            <div class="count">0</div>
        </div>

        <div class="bin" data-type="plastic" style="border-top-color: yellow;">
            Műanyag
            <div class="count">0</div>
        </div>

        <div class="bin" data-type="metal" style="border-top-color: gray;">
            Fém
            <div class="count">0</div>
        </div>

        <div class="bin" data-type="mixed" style="border-top-color: green;">
            Vegyes
            <div class="count">0</div>
        </div>
    </div>

    <div id="info">
        Pontszám: <span id="score">0</span> |
        Hibák: <span id="errors">0</span> |
        Idő: <span id="time">60</span>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
